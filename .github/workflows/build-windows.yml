name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release with the installer'
        type: boolean
        default: false
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: PropiedadesEl31Facturacion-Windows-Setup
          path: dist-installer/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release == true
        uses: softprops/action-gh-release@v2
        with:
          files: dist-installer/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}-{1}', github.run_number, github.sha) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
